<div style="
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  border: 2px solid #0A66C2;
  border-radius: 12px;
  padding: 30px 40px;
  z-index: 10000;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  text-align: center;
  width: auto;
  max-width: 400px;
">
  <div style="font-size: 28px; margin-bottom: 15px;">🎮</div>
  <div style="
    font-size: 18px;
    color: #0A66C2;
    font-weight: bold;
    margin-bottom: 10px;
  ">Turn on Assist Mode?</div>
  <div style="
    font-size: 14px;
    color: #666;
    margin-bottom: 25px;
  ">Enable assist mode for enhanced gaming features</div>
  
  <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
    <span style="font-size: 14px; color: #333;">Off</span>
    <label style="position: relative; display: inline-block; width: 60px; height: 30px;">
      <input type="checkbox" id="assist-toggle" style="opacity: 0; width: 0; height: 0;">
      <span style="
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 30px;
      " id="toggle-slider"></span>
      <span style="
        position: absolute;
        cursor: pointer;
        top: 3px;
        left: 3px;
        width: 24px;
        height: 24px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      " id="toggle-knob"></span>
    </label>
    <span style="font-size: 14px; color: #333;">On</span>
  </div>
</div>
